<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotogaleria | Chata Monika</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
</head>
<body>

    <div class="topbar">
        <div class="topbar-content">
            <span><i class="fas fa-map-marker-alt"></i> Liptovske Revuce</span>
            <span><i class="fas fa-phone"></i> +421 905 555 555</span>
        </div>
    </div>

    <nav>
        <div class="nav-container">
            <div class="logo"><a href="index.html">CHATA<span>MONIKA</span></a></div>
            <div class="nav-links">
                <a href="index.html">Domov</a>
                <a href="index.html#o-nas">O nás</a>
                <a href="index.html#cennik">Cenník</a>
                <a href="gallery.html" class="active">Fotogaléria</a>
                <a href="index.html#kontakt" class="btn-small">Kontakt</a>
            </div>
        </div>
    </nav>

    <main class="gallery-page">
    <h1 class="gallery-title">Nasa Galeria <span>Chata Monika</span></h1>

    <section class="gallery-wrapper">
        
        <div class="gallery-category">
            <h2>Nasa Galeria <span>Chata Monika</span></h2>
            <div class="slider-container">
                <button class="slider-btn prev" data-target="monika"><i class="fas fa-chevron-left"></i></button>
                
                <div class="slider-viewport">
                    <div class="slider-track" data-id="monika"></div>
                </div>
                
                <button class="slider-btn next" data-target="monika"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>

        <div class="gallery-category">
            <h2>Cast A</h2>
            <div class="slider-container">
                <button class="slider-btn prev" data-target="cast-a"><i class="fas fa-chevron-left"></i></button>
                
                <div class="slider-viewport">
                    <div class="slider-track" data-id="cast-a"></div>
                </div>
                
                <button class="slider-btn next" data-target="cast-a"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>

        <div class="gallery-category">
            <h2>Cast B</h2>
            <div class="slider-container">
                <button class="slider-btn prev" data-target="cast-b"><i class="fas fa-chevron-left"></i></button>
                
                <div class="slider-viewport">
                    <div class="slider-track" data-id="cast-b"></div>
                </div>
                
                <button class="slider-btn next" data-target="cast-b"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>

        <div class="gallery-category">
            <h2>Okolie</h2>
            <div class="slider-container">
                <button class="slider-btn prev" data-target="okolie"><i class="fas fa-chevron-left"></i></button>
                
                <div class="slider-viewport">
                    <div class="slider-track" data-id="okolie"></div>
                </div>
                
                <button class="slider-btn next" data-target="okolie"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>

    </section>
</main>
    <footer><p>&copy; 2026 Chata Monika.</p></footer>

    <div id="lightbox" class="lightbox">
        <span class="close-lightbox">&times;</span>
        <img id="lightbox-img" src="" alt="Detail">

    <script src="script.js"></script>
