<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotogaléria | Chata Monika</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="topbar">
        <div class="topbar-content">
            <span><i class="fas fa-map-marker-alt"></i> Liptovské Revúce, Slovensko</span>
            <span><i class="fas fa-phone"></i> +421 905 555 555</span>
        </div>
    </div>
    
    <nav>
        <div class="nav-container">
            <div class="logo"><a href="index.html">CHATA<span>MONIKA</span></a></div>
            <div class="nav-links">
                <a href="index.html">Domov</a>
                <a href="index.html#o-nas">O nás</a>
                <a href="index.html#cennik">Cenník</a>
                <a href="gallery.html">Fotogaléria</a>
                <a href="index.html#kontakt" class="btn-small">Kontakt</a>
            </div>
        </div>
    </nav>

    <section class="gallery-section">
    <div class="gallery-container">
        <h1 class="gallery-title">Naša Galéria <span>Chata Monika</span></h1>

        <div class="filter-menu">
            <button class="filter-btn active" data-filter="all">Všetko</button>
            <button class="filter-btn" data-filter="monika">Chata Monika</button>
            <button class="filter-btn" data-filter="cast-a">Časť A</button>
            <button class="filter-btn" data-filter="cast-b">Časť B</button>
            <button class="filter-btn" data-filter="okolie">Okolie (Pripravujeme)</button>
        </div>

        <div class="gallery-grid" id="gallery-grid">
            <div class="gallery-item" data-category="monika">
                <img src="img/monika-1.webp" alt="Chata Monika" loading="lazy">
                <div class="overlay"><span>Zobraziť detail</span></div>
            </div>
            <div class="gallery-item" data-category="cast-a">
                <img src="img/cast-a-1.webp" alt="Časť A" loading="lazy">
                <div class="overlay"><span>Zobraziť detail</span></div>
            </div>
            <div class="gallery-item" data-category="cast-b">
                <img src="img/cast-b-1.webp" alt="Časť B" loading="lazy">
                <div class="overlay"><span>Zobraziť detail</span></div>
            </div>
            <div class="gallery-item" data-category="okolie">
                <div class="coming-soon">Už čoskoro...</div>
            </div>
        </div>
    </div>
</section>

<div id="lightbox" class="lightbox">
    <span class="close-lightbox">&times;</span>
    <img class="lightbox-content" id="lightbox-img">
</div>


    <footer>
        <p>&copy; 2026 Chata Monika.</p>
    </footer>

</body>
</html>
